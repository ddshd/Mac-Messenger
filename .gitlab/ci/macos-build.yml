.macos_build_template:
  stage: build
  variables:
    LANG: "en_US.UTF-8"
    LC_ALL: "en_US.UTF-8"
    ELECTRON_CACHE: "$CI_PROJECT_DIR/.cache/electron"
    ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.cache/electron-builder"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    CSC_IDENTITY_AUTO_DISCOVERY: "false"
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - .cache/electron/
      - .cache/electron-builder/
      - node_modules/
    policy: pull-push
  before_script:
    - node --version || true
    - npm --version || true
    - npm ci
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - dist/*.dmg
      - dist/*.zip
      - dist/*.blockmap
      - dist/latest*.yml

build:mac:x64:
  extends: .macos_build_template
  tags:
    - macos
    - x64
  script:
    - npm run dist:mac:x64

build:mac:arm64:
  extends: .macos_build_template
  tags:
    - macos
    - arm64
  script:
    - npm run dist:mac:arm64